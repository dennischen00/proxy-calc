<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>日本代購試算</title>
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="日本代購" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fbf4f3;
      --surface: #fffdfb;
      --surface2: #f3eae7;
      --border: #e0cfcb;
      --text: #1a1a1a;
      --muted: #6b6860;
      --hint: #a09d97;
      --accent: #c62828;
      --accent-light: #fdecec;
      --accent-border: #e8a0a0;
      --radius: 14px;
      --radius-sm: 8px;
      --content-max: 480px;
      --gutter: 16px;
    }
    @media (min-width: 600px) {
      :root { --content-max: 540px; --gutter: 24px; }
    }
    @media (min-width: 900px) {
      :root { --content-max: 600px; --gutter: 32px; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { background: var(--bg); }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .header {
      background: var(--text);
      color: var(--bg);
      padding: 16px 20px 14px;
      padding-top: calc(16px + env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-inner { max-width: var(--content-max); margin: 0 auto; }
    .header h1 { font-size: clamp(17px, 4vw, 20px); font-weight: 700; letter-spacing: 0.02em; }
    .header p { font-size: clamp(11px, 2.5vw, 13px); color: #a09d97; margin-top: 2px; }

    .content { padding: 20px var(--gutter); max-width: var(--content-max); margin: 0 auto; }

    .label { font-size: 11px; font-weight: 700; color: var(--hint); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

    .krw-wrap { margin-bottom: 20px; }
    .krw-input-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      transition: border-color 0.15s;
    }
    .krw-input-row:focus-within { border-color: var(--text); box-shadow: 0 0 0 3px rgba(26,26,26,0.06); }
    .krw-symbol { font-family: 'DM Mono', monospace; font-size: clamp(20px, 5vw, 24px); color: var(--hint); flex-shrink: 0; }
    .krw-input-row input {
      flex: 1; min-width: 0; border: none; background: transparent; font-family: 'DM Mono', monospace;
      font-size: clamp(24px, 7vw, 32px); font-weight: 500; color: var(--text); text-align: right; outline: none;
      -moz-appearance: textfield;
    }
    .krw-input-row input::-webkit-outer-spin-button,
    .krw-input-row input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .rate-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .rate-info { flex: 1; min-width: 150px; }
    .rate-val { font-family: 'DM Mono', monospace; font-size: clamp(13px, 3.5vw, 15px); font-weight: 500; color: var(--text); }
    .rate-meta { font-size: 11px; color: var(--hint); margin-top: 2px; }
    .rate-btn {
      padding: 8px 14px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
      font-weight: 500; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text); cursor: pointer; white-space: nowrap;
      transition: background 0.15s, transform 0.1s;
    }
    .rate-btn:hover { background: var(--surface2); }
    .rate-btn:active { transform: scale(0.97); }
    .rate-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .spin { display: inline-block; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { font-size: 12px; color: #c0392b; margin-top: -12px; margin-bottom: 14px; padding: 0 4px; }

    .ship-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .ship-btn {
      padding: 12px 8px; font-size: clamp(13px, 3.5vw, 14px); font-weight: 500; font-family: 'Noto Sans TC', sans-serif;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); color: var(--muted); cursor: pointer; text-align: center;
      transition: all 0.15s;
    }
    .ship-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }
    .ship-btn:active { transform: scale(0.97); }
    .ship-btn span { display: block; font-size: 11px; font-family: 'DM Mono', monospace; margin-top: 3px; opacity: 0.7; }

    .results { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: clamp(12px, 3vw, 18px) clamp(14px, 3.5vw, 20px);
    }
    .result-card.main { background: var(--text); border-color: var(--text); }
    .result-card .rlabel { font-size: 11px; color: var(--hint); font-weight: 500; margin-bottom: 6px; }
    .result-card.main .rlabel { color: #a09d97; }
    .result-card .rval {
      font-family: 'DM Mono', monospace;
      font-size: clamp(20px, 5.5vw, 28px);
      font-weight: 500; color: var(--text);
      word-break: break-all;
    }
    .result-card.main .rval { color: var(--bg); }
    .result-card .rsub { font-size: 11px; color: var(--hint); margin-top: 3px; }
    .result-card.main .rsub { color: #6b6860; }

    .breakdown { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
    .brow { display: flex; justify-content: space-between; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); }
    .brow:last-child { border-bottom: none; }
    .brow.total { background: var(--surface2); }
    .brow .bn { font-size: 13px; color: var(--muted); }
    .brow .bv { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); }
    .brow.total .bn { font-weight: 700; color: var(--text); font-size: 14px; }
    .brow.total .bv { font-size: 15px; color: var(--accent); }

    .params-toggle {
      display: flex; align-items: center; gap: 8px; padding: 12px 0;
      font-size: 13px; color: var(--muted); cursor: pointer; user-select: none; border: none;
      background: none; width: 100%; font-family: 'Noto Sans TC', sans-serif;
    }
    .params-toggle .arrow { font-size: 10px; transition: transform 0.2s; }
    .params-toggle.open .arrow { transform: rotate(90deg); }
    .params-section {
      display: grid; grid-template-rows: 0fr;
      transition: grid-template-rows 0.25s ease;
    }
    .params-section > .params-inner { overflow: hidden; }
    .params-section.open { grid-template-rows: 1fr; }
    .param-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
    .param-group-label { font-size: 11px; font-weight: 700; color: var(--hint); text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 16px 8px; background: var(--surface2); border-bottom: 1px solid var(--border); }
    .param-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .param-row:last-child { border-bottom: none; }
    .param-row label { flex: 1; font-size: 13px; color: var(--muted); min-width: 0; }
    .param-row input {
      width: 100px; text-align: right; font-family: 'DM Mono', monospace; font-size: 14px;
      padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg); color: var(--text); outline: none; flex-shrink: 0;
      -moz-appearance: textfield;
    }
    .param-row input::-webkit-outer-spin-button,
    .param-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .param-row input:focus { border-color: var(--text); }
    .param-unit { font-size: 12px; color: var(--hint); width: 30px; flex-shrink: 0; }

    .offline-badge { display: none; font-size: 11px; background: #fff3cd; color: #856404; border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 12px; }

    @media (max-width: 359px) {
      .results { grid-template-columns: 1fr; }
      .rate-bar { flex-direction: column; align-items: stretch; }
      .rate-btn { width: 100%; text-align: center; }
      .param-row { flex-wrap: wrap; }
      .param-row label { width: 100%; }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .header { position: relative; padding: 10px 20px 8px; }
      .header h1 { font-size: 16px; }
      .header p { display: none; }
      .content { padding-top: 12px; }
    }

    @media (min-width: 600px) {
      .results { gap: 14px; }
      .result-card .rval { font-size: 28px; }
      .brow { padding: 13px 20px; }
      .brow .bn { font-size: 14px; }
      .brow .bv { font-size: 14px; }
      .brow.total .bn { font-size: 15px; }
      .brow.total .bv { font-size: 16px; }
      .ship-btn { padding: 14px 8px; }
    }

    @media (min-width: 900px) {
      .header { padding: 20px 32px 16px; }
      .content { padding: 28px var(--gutter); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-inner">
      <h1>日本代購試算 🗾</h1>
      <p>日幣・蝦皮上架版本</p>
    </div>
  </div>

  <div class="content">
    <div class="offline-badge" id="offline-badge">⚠ 目前離線，匯率使用上次儲存值</div>

    <div class="krw-wrap">
      <div class="label">日幣售價</div>
      <div class="krw-input-row">
        <span class="krw-symbol">¥</span>
        <input type="number" id="jpy" placeholder="0" min="0" step="1" inputmode="numeric" oninput="calc()" />
      </div>
    </div>

    <div class="rate-bar">
      <div class="rate-info">
        <div class="rate-val" id="rate-display">¥1 = NT$0.210</div>
        <div class="rate-meta" id="rate-time">使用預設值・點右方取得即時匯率</div>
      </div>
      <button class="rate-btn" id="fetch-btn" onclick="fetchRate()">
        <span id="fetch-icon">↻</span> 即時匯率
      </button>
    </div>
    <div class="err" id="err-msg"></div>

    <div class="label">攤提國際運費</div>
    <div class="ship-toggle">
      <button class="ship-btn active" id="btn-light" onclick="setShip(50)">
        輕的<span>NT$50</span>
      </button>
      <button class="ship-btn" id="btn-heavy" onclick="setShip(150)">
        重的<span>NT$150</span>
      </button>
    </div>

    <div class="label">計算結果</div>
    <div class="results">
      <div class="result-card main">
        <div class="rlabel">蝦皮上架價</div>
        <div class="rval" id="res-total">—</div>
        <div class="rsub" id="res-sub">輸入金額後顯示</div>
      </div>
      <div class="result-card">
        <div class="rlabel">台幣本金</div>
        <div class="rval" id="res-base">—</div>
        <div class="rsub">日幣換算</div>
      </div>
    </div>

    <div class="label">費用明細</div>
    <div class="breakdown">
      <div class="brow"><span class="bn">日幣換台幣</span><span class="bv" id="bd-base">—</span></div>
      <div class="brow"><span class="bn" id="bd-proxy-label">代購費（10%）</span><span class="bv" id="bd-proxy">—</span></div>
      <div class="brow"><span class="bn" id="bd-shopee-label">蝦皮手續費（20%）</span><span class="bv" id="bd-shopee">—</span></div>
      <div class="brow"><span class="bn">攤提國際運費</span><span class="bv" id="bd-ship">—</span></div>
      <div class="brow total"><span class="bn">合計</span><span class="bv" id="bd-total">—</span></div>
    </div>

    <button class="params-toggle" id="params-toggle" onclick="toggleParams()">
      <span class="arrow">▶</span> 調整參數（匯率 / 費率）
    </button>
    <div class="params-section" id="params-section">
      <div class="params-inner">
      <div class="param-card">
        <div class="param-group-label">偶爾變動</div>
        <div class="param-row">
          <label>匯率（¥1 = NT$?）</label>
          <input type="number" id="rate" value="0.21" min="0.01" step="0.001" oninput="onRateManual()" />
          <span class="param-unit">TWD</span>
        </div>
      </div>
      <div class="param-card">
        <div class="param-group-label">費率</div>
        <div class="param-row">
          <label>代購費</label>
          <input type="number" id="proxy-pct" value="10" min="0" step="1" oninput="calc()" />
          <span class="param-unit">%</span>
        </div>
        <div class="param-row">
          <label>蝦皮手續費</label>
          <input type="number" id="shopee-pct" value="20" min="0" step="1" oninput="calc()" />
          <span class="param-unit">%</span>
        </div>
      </div>
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    function updateOnlineStatus() {
      document.getElementById('offline-badge').style.display = navigator.onLine ? 'none' : 'block';
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    const KEYS = ['rate', 'proxy-pct', 'shopee-pct'];
    KEYS.forEach(k => {
      const v = localStorage.getItem('jp_' + k);
      if (v) document.getElementById(k).value = v;
    });
    const savedShip = localStorage.getItem('jp_ship');
    let shipFee = savedShip ? parseInt(savedShip) : 50;
    setShip(shipFee, true);

    let liveRate = false;

    function saveParams() {
      KEYS.forEach(k => localStorage.setItem('jp_' + k, document.getElementById(k).value));
      localStorage.setItem('jp_ship', shipFee);
    }

    function setShip(v, init) {
      shipFee = v;
      document.getElementById('btn-light').className = 'ship-btn' + (v === 50 ? ' active' : '');
      document.getElementById('btn-heavy').className = 'ship-btn' + (v === 150 ? ' active' : '');
      if (!init) { saveParams(); calc(); }
    }

    function toggleParams() {
      document.getElementById('params-section').classList.toggle('open');
      document.getElementById('params-toggle').classList.toggle('open');
    }

    function onRateManual() {
      liveRate = false;
      document.getElementById('rate-time').textContent = '使用手動值';
      updateRateDisplay();
      saveParams();
      calc();
    }

    function updateRateDisplay() {
      const rate = parseFloat(document.getElementById('rate').value) || 0.21;
      document.getElementById('rate-display').textContent =
        `¥1 = NT$${rate.toFixed(3)}${liveRate ? '（即時）' : ''}`;
    }

    async function fetchRate() {
      const btn = document.getElementById('fetch-btn');
      const icon = document.getElementById('fetch-icon');
      const err = document.getElementById('err-msg');
      btn.disabled = true;
      icon.className = 'spin';
      err.textContent = '';

      try {
        const res = await fetch('https://open.er-api.com/v6/latest/TWD');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (data.result !== 'success') throw new Error('API 錯誤');

        const jpy = data.rates['JPY'];
        if (!jpy) throw new Error('找不到 JPY');
        const rateVal = (1 / jpy).toFixed(4);

        document.getElementById('rate').value = rateVal;
        liveRate = true;
        localStorage.setItem('jp_rate', rateVal);

        const t = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('rate-time').textContent = `來源：open.er-api.com・${t} 更新`;
        updateRateDisplay();
        calc();
      } catch (e) {
        err.textContent = '無法取得即時匯率：' + e.message;
      } finally {
        btn.disabled = false;
        icon.className = '';
        icon.textContent = '↻';
      }
    }

    function fmt(n) { return 'NT$' + Math.round(n).toLocaleString('zh-TW'); }

    function calc() {
      const jpy = parseFloat(document.getElementById('jpy').value) || 0;
      const rate = parseFloat(document.getElementById('rate').value) || 0.21;
      const proxyPct = parseFloat(document.getElementById('proxy-pct').value) || 0;
      const shopeePct = parseFloat(document.getElementById('shopee-pct').value) || 0;

      saveParams();
      updateRateDisplay();

      document.getElementById('bd-proxy-label').textContent = `代購費（${proxyPct}%）`;
      document.getElementById('bd-shopee-label').textContent = `蝦皮手續費（${shopeePct}%）`;

      const dash = '—';
      if (!jpy) {
        ['bd-base','bd-proxy','bd-shopee','bd-ship','bd-total','res-total','res-base'].forEach(id => {
          document.getElementById(id).textContent = dash;
        });
        document.getElementById('res-sub').textContent = '輸入金額後顯示';
        return;
      }

      const base = jpy * rate;
      const proxyFee = base * (proxyPct / 100);
      const shopeeFee = (base + proxyFee) * (shopeePct / 100);
      const total = base + proxyFee + shopeeFee + shipFee;

      document.getElementById('bd-base').textContent = fmt(base);
      document.getElementById('bd-proxy').textContent = fmt(proxyFee);
      document.getElementById('bd-shopee').textContent = fmt(shopeeFee);
      document.getElementById('bd-ship').textContent = fmt(shipFee);
      document.getElementById('bd-total').textContent = fmt(total);

      document.getElementById('res-total').textContent = fmt(total);
      document.getElementById('res-base').textContent = fmt(base);
      document.getElementById('res-sub').textContent = `≈ ¥${Math.round(jpy).toLocaleString('zh-TW')}`;
    }

    updateRateDisplay();
    calc();
  </script>
</body>
</html>
